<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Průběžné výsledky — Silový čtyřboj SŠTaS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00b09b;
    --teal-dark: #008a78;
    --navy: #122043;
    --navy-light: #1a2d5a;
    --gold: #f0a500;
    --white: #ffffff;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    color: white;
    padding: 12px 12px 32px;
  }
  .header {
    text-align: center;
    padding: 16px 0 14px;
    border-bottom: 2px solid rgba(0,176,155,0.3);
    margin-bottom: 20px;
  }
  .header img { height: 64px; width: auto; display: block; margin: 0 auto 8px; }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .header h1 span { color: var(--teal); }
  .update-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .update-time {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }
  .countdown {
    background: rgba(0,176,155,0.15);
    border: 1px solid rgba(0,176,155,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--teal);
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--teal);
    margin: 20px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0,176,155,0.2);
  }
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .results-table th {
    background: rgba(0,176,155,0.12);
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 7px 4px;
    text-align: center;
    border-bottom: 1px solid rgba(0,176,155,0.15);
  }
  .results-table th.left { text-align: left; padding-left: 8px; }
  .results-table td {
    padding: 9px 4px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  .results-table td.left { text-align: left; padding-left: 8px; }
  .rank-1 td { background: rgba(255,215,0,0.07); }
  .rank-2 td { background: rgba(192,192,192,0.05); }
  .rank-3 td { background: rgba(205,127,50,0.05); }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
  }
  .rank-1 .rank-badge { background: #ffd700; color: #000; }
  .rank-2 .rank-badge { background: #c0c0c0; color: #000; }
  .rank-3 .rank-badge { background: #cd7f32; color: #000; }
  .rank-other { color: rgba(255,255,255,0.4); font-size: 12px; }
  .name-cell { font-weight: 600; font-size: 13px; line-height: 1.2; }
  .school-cell { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }
  .total-body {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--teal);
  }
  .val { color: rgba(255,255,255,0.75); }
  .val-empty { color: rgba(255,255,255,0.15); font-size: 10px; }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.4);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-msg { text-align: center; padding: 20px; color: rgba(255,255,255,0.3); font-size: 13px; }
  .footer {
    text-align: center;
    padding: 20px 0 4px;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1px;
  }
  .error-banner {
    background: rgba(200,16,46,0.15);
    border: 1px solid rgba(200,16,46,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin: 20px 0;
  }
</style>
</head>

  <h1>Silový <span>čtyřboj</span></h1>
  <div class="update-row">
    <span class="update-time" id="update-time">Načítám...</span>
    <span class="countdown" id="countdown">⟳</span>
  </div>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>Načítám výsledky...</div>
  </div>
</div>

<div class="footer">SŠTaS Karviná · Silový čtyřboj</div>

<script>
// Konfigurace - Excel data se ctou pres SharePoint REST API (verejny pristup)
const DRIVE_ID = 'b!VPQCAZUA8k6i3FVawVnIkJfSP1PvkBZAgHF6JXEQ333FilA9cyv0SodfdVs4xISa';
const FILE_ID = '01FLMNRJSHCJMNN7PLIVE2RFT64GLPO7LJ';
const SP_HOST = 'https://sstaska.sharepoint.com';
const SITE_PATH = '/sites/Silovy4boj';
const UPDATE_INTERVAL = 10 * 60 * 1000; // 10 minut

let nextUpdate = null;
let countdownTimer = null;

// SharePoint REST API - nevyzaduje MSAL pro verejne sdilene soubory
// Pouzijeme fetch s credentials: 'include' pro cookies autentizaci SharePointu
async function fetchTable(tableName) {
  const url = `${SP_HOST}/_api/v2.1/drives/${DRIVE_ID}/items/${FILE_ID}/workbook/tables/${tableName}/rows`;
  const resp = await fetch(url, {
    credentials: 'include',
    headers: { 'Accept': 'application/json' }
  });
  if (!resp.ok) throw new Error('Chyba ' + resp.status);
  const data = await resp.json();
  return data.value;
}

async function loadData() {
  try {
    const [muziRows, zenyRows] = await Promise.all([
      fetchTable('VysledkyMuzi'),
      fetchTable('VysledkyZeny')
    ]);
    renderResults(muziRows, zenyRows);
    const now = new Date();
    document.getElementById('update-time').textContent =
      'Aktualizováno: ' + now.toLocaleTimeString('cs-CZ', {hour: '2-digit', minute: '2-digit'});
    scheduleNext();
  } catch(e) {
    console.error(e);
    document.getElementById('content').innerHTML =
      '<div class="error-banner">⚠️ Nepodařilo se načíst výsledky.<br>Zkuste obnovit stránku.</div>';
    scheduleNext();
  }
}

function v(val) {
  if (val === null || val === undefined || val === '' || Number(val) === 0) 
    return '<span class="val-empty">—</span>';
  return '<span class="val">' + val + '</span>';
}

function renderResults(muziRows, zenyRows) {
  const muzi = muziRows
    .map(r => r.values[0])
    .filter(r => r[0] && Number(r[0]) > 0 && r[1] !== 'test')
    .sort((a, b) => (Number(b[16])||0) - (Number(a[16])||0));

  const zeny = zenyRows
    .map(r => r.values[0])
    .filter(r => r[0] && Number(r[0]) > 0 && r[1] !== 'test')
    .sort((a, b) => (Number(b[16])||0) - (Number(a[16])||0));

  let html = '';

  // MUZI tabulka
  html += '<div class="section-title">👨 Muži</div>';
  if (muzi.length === 0) {
    html += '<div class="empty-msg">Zatím žádné výsledky</div>';
  } else {
    html += '<table class="results-table"><thead><tr>' +
      '<th>#</th><th class="left">Závodník</th>' +
      '<th>Bench<br>op.</th><th>Trojskok<br>cm</th>' +
      '<th>Shyby<br>op.</th><th>Vznosy<br>op.</th>' +
      '<th>Body</th></tr></thead><tbody>';
    muzi.forEach((r, i) => {
      const rank = i + 1;
      const rc = rank <= 3 ? 'rank-' + rank : '';
      const badge = rank <= 3
        ? '<span class="rank-badge">' + rank + '</span>'
        : '<span class="rank-other">' + rank + '</span>';
      const ts = Math.max(Number(r[8])||0, Number(r[9])||0, Number(r[10])||0);
      html += '<tr class="' + rc + '">' +
        '<td>' + badge + '</td>' +
        '<td class="left"><div class="name-cell">' + r[1] + ' ' + r[2] + '</div>' +
        '<div class="school-cell">' + (r[3]||'') + '</div></td>' +
        '<td>' + v(r[6]) + '</td>' +
        '<td>' + v(ts > 0 ? ts : null) + '</td>' +
        '<td>' + v(r[12]) + '</td>' +
        '<td>' + v(r[14]) + '</td>' +
        '<td><span class="total-body">' + (r[16] ? Number(r[16]).toFixed(1) : '—') + '</span></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }

  // ZENY tabulka
  html += '<div class="section-title">👩 Ženy</div>';
  if (zeny.length === 0) {
    html += '<div class="empty-msg">Zatím žádné výsledky</div>';
  } else {
    html += '<table class="results-table"><thead><tr>' +
      '<th>#</th><th class="left">Závodnice</th>' +
      '<th>Trojskok<br>cm</th><th>Šplh<br>s</th>' +
      '<th>Hod<br>cm</th><th>L-S<br>op.</th>' +
      '<th>Body</th></tr></thead><tbody>';
    zeny.forEach((r, i) => {
      const rank = i + 1;
      const rc = rank <= 3 ? 'rank-' + rank : '';
      const badge = rank <= 3
        ? '<span class="rank-badge">' + rank + '</span>'
        : '<span class="rank-other">' + rank + '</span>';
      const ts = Math.max(Number(r[4])||0, Number(r[5])||0, Number(r[6])||0);
      const splhArr = [r[8], r[9]].filter(x => x && Number(x) > 0).map(Number);
      const splh = splhArr.length > 0 ? Math.min(...splhArr) : null;
      const hod = Math.max(Number(r[11])||0, Number(r[12])||0, Number(r[13])||0);
      html += '<tr class="' + rc + '">' +
        '<td>' + badge + '</td>' +
        '<td class="left"><div class="name-cell">' + r[1] + ' ' + r[2] + '</div>' +
        '<div class="school-cell">' + (r[3]||'') + '</div></td>' +
        '<td>' + v(ts > 0 ? ts : null) + '</td>' +
        '<td>' + v(splh) + '</td>' +
        '<td>' + v(hod > 0 ? hod : null) + '</td>' +
        '<td>' + v(r[15]) + '</td>' +
        '<td><span class="total-body">' + (r[16] ? Number(r[16]).toFixed(1) : '—') + '</span></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }

  document.getElementById('content').innerHTML = html;
}

function scheduleNext() {
  nextUpdate = Date.now() + UPDATE_INTERVAL;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    const rem = Math.max(0, nextUpdate - Date.now());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    document.getElementById('countdown').textContent =
      '⟳ ' + m + ':' + String(s).padStart(2,'0');
    if (rem === 0) {
      clearInterval(countdownTimer);
      document.getElementById('countdown').textContent = '⟳ Aktualizuji...';
      loadData();
    }
  }, 1000);
}

// Spust
loadData();
</script>
